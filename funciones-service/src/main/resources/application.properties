spring.application.name=funciones-service
server.port=9095

spring.datasource.url=jdbc:mysql://localhost:3306/bd_funciones?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

api.base-url=http://localhost:9090
api.sala.exists=/salas/%d/exists
api.pelicula.exists=/peliculas/%d/exists
api.usuario.exists=/usuarios/%d/exists
api.funcion.exists=/funciones/%d/exists

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.file.name=logs/compra-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n