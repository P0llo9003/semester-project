spring.application.name=pago-service
server.port=9097

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_pago?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

api.base-url=http://api-gateway:9090
api.entrada.exists=/entradas/%d/exists

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

logging.file.name=logs/pago-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n
