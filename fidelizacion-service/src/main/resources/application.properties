spring.application.name=fidelizacion-service
server.port=9096

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_fidelizacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

api.base-url=http://api-gateway:9090
api.usuario.exists=/usuarios/%d/exists

logging.file.name=logs/fidelizacion-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html